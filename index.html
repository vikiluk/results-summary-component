<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">

  <title>Frontend Mentor | Results summary component</title>

</head>
<body>
  <main class="card">
    <div class="results">
      <h2 class="result-header">Your Result</h2>
        <div class="circle">
          <p class="achieved-score">76</p>
          <p class="total-score">of 100</p>
        </div>
      <p class="score-result">Great</p>
      <p class="result-description">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="summary">
      <h2 class="summary-header">Summary</h2>
        <div class="category category-reaction">

          <div class="spacer">
          <img src="./assets/images/icon-reaction.svg" alt="reaction icon">
          <p>Reaction</p>
          </div>
          <p><span class="reached-score">80</span><span class="max-score"> / 100</span></p>
        </div>

        <div class="category category-memory">
          <div class="spacer">
          <img src="./assets/images/icon-memory.svg" alt="memory icon">
          <p>Memory</p>
          </div>
          <p><span class="reached-score">92</span><span class="max-score"> / 100</span></p>
        </div>

        <div class="category category-verbal">
          <div class="spacer">
          <img src="./assets/images/icon-verbal.svg" alt="verbal icon">
          <p>Verbal</p>
          </div>
          <p><span class="reached-score">61</span><span class="max-score"> / 100</span></p>
        </div>

        <div class="category category-visual">
          <div class="spacer">
          <img src="./assets/images/icon-visual.svg" alt="visual icon">
          <p>Visual</p>
          </div>
          <p><span class="reached-score">72</span><span class="max-score"> / 100</span></p>
        </div>

        <button class="continue-btn">Continue</button>
    </div>
  </main>
</body>
</html>
